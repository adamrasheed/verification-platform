name: Bug report
description: Report reproducible incorrect behavior in the verification platform.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use the private security reporting link instead.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, including the complete command and sanitized output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a minimal repository or list exact reproduction steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `verify version` or the npm package version.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, and package manager.
    validations:
      required: true

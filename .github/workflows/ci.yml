name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"
          - "24"
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Install exact dependencies
        run: npm ci --ignore-scripts

      - name: Run conformance suite
        run: npm test

  native-macos:
    name: Native macOS sandbox
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install exact dependencies
        run: npm ci --ignore-scripts

      - name: Build workspaces
        run: npm run build

      - name: Run native sandbox conformance
        run: npm run test --workspace @verify-internal/plugin-runtime

  native-linux:
    name: Native Linux sandbox
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install native sandbox dependencies
        run: sudo apt-get update && sudo apt-get install --yes bubblewrap libssl-dev

      - name: Install exact dependencies
        run: npm ci --ignore-scripts

      - name: Build workspaces
        run: npm run build

      - name: Run native sandbox conformance
        env:
          VERIFY_RUN_LINUX_NATIVE: "1"
        run: npm run test --workspace @verify-internal/plugin-runtime

  native-windows:
    name: Native Windows sandbox
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Install exact dependencies
        run: npm ci --ignore-scripts

      - name: Build workspaces
        run: npm run build

      - name: Run native sandbox conformance
        env:
          VERIFY_RUN_WINDOWS_NATIVE: "1"
          VERIFY_DEBUG_WINDOWS_NATIVE: "1"
        run: npm run test --workspace @verify-internal/plugin-runtime
